services:
  postgres:
    image: postgres:16-alpine
    container_name: kompetenzhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kompetenzhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kompetenzhub}
      POSTGRES_DB: ${POSTGRES_DB:-kompetenzhub}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Legt beim ERSTEN Hochfahren (leeres Volume) zusaetzlich die Logto-DB an.
      # Bei bereits bestehendem Volume einmalig manuell:
      #   docker compose -f docker-compose_dev.yaml exec postgres \
      #     createdb -U kompetenzhub logto
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kompetenzhub}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kompetenzhub-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: kompetenzhub-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Eigener Identity-Provider (Logto): Self-Service-Registrierung mit E-Mail/Passwort ──
  # Nutzt denselben Postgres-Server, aber eine eigene Datenbank `logto`.
  # OIDC-Endpoint (Login/Registrierung): http://localhost:3011
  # Admin-Konsole (App anlegen, Client-ID/Secret holen): http://localhost:3012
  logto:
    image: svhd/logto:latest
    container_name: kompetenzhub-logto
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    # Schema beim Start sicherstellen (idempotent), danach Server starten.
    entrypoint: ['sh', '-c', 'npm run cli db seed -- --swe && npm start']
    environment:
      # Logto MUSS intern auf denselben Ports lauschen, die der Browser sieht: Die CORS-Allowlist
      # der Admin-Konsole basiert auf dem internen Listen-Port. Veroeffentlicht man einen anderen
      # Port (z. B. 3012->3002), passt die Browser-Origin nicht zur erlaubten Origin und der Core
      # liefert kein Access-Control-Allow-Origin -> "Create application" haengt ohne Fehler.
      # Standardport 3001 (Core) kollidiert mit der KompetenzHub-API, daher 3011/3012.
      PORT: 3011
      ADMIN_PORT: 3012
      DB_URL: postgresql://${POSTGRES_USER:-kompetenzhub}:${POSTGRES_PASSWORD:-kompetenzhub}@postgres:5432/logto
      ENDPOINT: ${KOMPETENZHUB_OIDC_ENDPOINT:-http://localhost:3011}
      ADMIN_ENDPOINT: ${KOMPETENZHUB_ADMIN_ENDPOINT:-http://localhost:3012}
      CONNECTORS: '[{"id":"smtp-mail","target":"@logto/connector-smtp","config":{"host":"${SMTP_HOST}","port":${SMTP_PORT},"secure":${SMTP_SECURE},"auth":{"user":"${SMTP_USER}","pass":"${SMTP_PASS}"},"from":"${SMTP_USER}"}}]'
    ports:
      - '3011:3011' # OIDC-Endpoint  (Core)
      - '3012:3012' # Admin-Konsole
    healthcheck:
      # Erst "healthy", wenn die OIDC-Discovery antwortet -> dann ist die DB geseedet.
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3011/oidc/.well-known/openid-configuration',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Logto-Vorkonfiguration: Selbst-Registrierung auf E-Mail+Passwort umstellen ──
  # Einmaliger Init nach dem Logto-Seed. KompetenzHub identifiziert Nutzer:innen ueber die
  # E-Mail – Logtos Standard ("username") wuerde sonst zu Konten ohne E-Mail fuehren und der
  # /auth/exchange schluege fehl. Das SQL greift nur den unveraenderten Standard (idempotent,
  # ueberschreibt spaetere Konsolen-Anpassungen der Schuladmin nicht).
  logto-init:
    image: postgres:16-alpine
    container_name: kompetenzhub-logto-init
    restart: 'no'
    depends_on:
      logto: { condition: service_healthy }
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-kompetenzhub}      
    volumes:
      - ./infra/logto:/sql:ro
    command:
      - psql
      - -h
      - postgres
      - -U
      - ${POSTGRES_USER:-kompetenzhub}
      - -d
      - logto
      - -v
      - ON_ERROR_STOP=1
      - -f
      - /sql/10-email-identifier.sql

  # ── Anwendung (nur mit Profil "app", z. B. `docker compose -f docker-compose_dev.yaml --profile  app up -d --build`) ──
  api:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kompetenzhub-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      NODE_ENV: development
      API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-kompetenzhub}:${POSTGRES_PASSWORD:-kompetenzhub}@postgres:5432/${POSTGRES_DB:-kompetenzhub}?schema=public
      REDIS_URL: redis://redis:6379
      # S3_ENDPOINT: interne Adresse (Container→MinIO); S3_PUBLIC_URL: Browser-erreichbar
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      S3_BUCKET: ${S3_BUCKET:-kompetenzhub}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # In Produktion zwingend starke Werte in .env setzen (sonst bricht der Start ab).
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:?Bitte starken Wert in .env setzen}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-900}
      AI_CONFIG_ENC_KEY: ${AI_CONFIG_ENC_KEY:?Bitte starken Wert in .env setzen}
      DEV_LOGIN_ENABLED: 'true'
      SHOW_ADMIN_LOGIN: 'false'
      AUTH_EXCHANGE_SECRET: ${AUTH_EXCHANGE_SECRET:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
      NEXT_PUBLIC_WEB_URL: ${WEB_PUBLIC_URL:-http://localhost:3000}
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-300}
      THROTTLE_AUTH_LIMIT: ${THROTTLE_AUTH_LIMIT:-60}
      # ----- Auth (OIDC) – Frontend (NextAuth), optional bis IdP angebunden -----
      AUTH_MICROSOFT_CLIENT_ID: ${AUTH_MICROSOFT_CLIENT_ID:-noch-zu-setzen}
      AUTH_MICROSOFT_CLIENT_SECRET: ${AUTH_MICROSOFT_CLIENT_SECRET:-noch-zu-setze}
      AUTH_MICROSOFT_TENANT_ID: ${AUTH_MICROSOFT_TENANT_ID:-common}
      AUTH_GITHUB_CLIENT_ID: ${AUTH_GITHUB_CLIENT_ID:-}
      AUTH_GITHUB_CLIENT_SECRET: ${AUTH_GITHUB_CLIENT_SECRET:-}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
      AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-}
      # Eigener IdP (Logto). Die API ruft Logto NICHT auf – sie nutzt diese Werte nur,
      # um den Provider auf der Login-Seite als "konfiguriert" anzuzeigen, und vertraut
      # beim /auth/exchange dem vom web-Container verifizierten Profil (AUTH_EXCHANGE_SECRET).
      # Daher genügt hier der öffentliche Issuer; host.docker.internal ist NICHT nötig.
      KOMPETENZHUB_OIDC_ISSUER: ${KOMPETENZHUB_OIDC_ISSUER:-}
      KOMPETENZHUB_OIDC_CLIENT_ID: ${KOMPETENZHUB_OIDC_CLIENT_ID:-}
      KOMPETENZHUB_OIDC_CLIENT_SECRET: ${KOMPETENZHUB_OIDC_CLIENT_SECRET:-}
    ports:
      - '${API_PORT:-3001}:3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3001/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_API_URL wird zur Build-Zeit ins Bundle gebacken (Browser-seitig).
        NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:-http://localhost:3001}
    container_name: kompetenzhub-web
    restart: unless-stopped
    depends_on:
      api: { condition: service_healthy }
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:-http://localhost:3001}
      API_INTERNAL_URL: http://api:3001
      AUTH_EXCHANGE_SECRET: ${AUTH_EXCHANGE_SECRET:-}
      AUTH_MICROSOFT_CLIENT_ID: ${AUTH_MICROSOFT_CLIENT_ID:-noch-zu-setzen}
      AUTH_MICROSOFT_CLIENT_SECRET: ${AUTH_MICROSOFT_CLIENT_SECRET:-noch-zu-setze}
      AUTH_MICROSOFT_TENANT_ID: ${AUTH_MICROSOFT_TENANT_ID:-common}
      AUTH_GITHUB_CLIENT_ID: ${AUTH_GITHUB_CLIENT_ID:-}
      AUTH_GITHUB_CLIENT_SECRET: ${AUTH_GITHUB_CLIENT_SECRET:-}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
      AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-}
      # Eigener IdP (Logto). Im reinen Container-Betrieb (--profile app) muss der Issuer
      # eine sowohl vom Browser als auch vom web-Container erreichbare URL sein
      # (z. B. http://host.docker.internal:3011/oidc) und mit Logtos ENDPOINT übereinstimmen.
      KOMPETENZHUB_OIDC_ISSUER: ${KOMPETENZHUB_OIDC_ISSUER:-}
      KOMPETENZHUB_OIDC_CLIENT_ID: ${KOMPETENZHUB_OIDC_CLIENT_ID:-}
      KOMPETENZHUB_OIDC_CLIENT_SECRET: ${KOMPETENZHUB_OIDC_CLIENT_SECRET:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-mein-dev-nextauth-secret-change-me-in-production124364546v34243vdfs}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    ports:
      - '${WEB_PORT:-3000}:3000'

    # ── Anwendung (nur mit Profil "maintenance", z. B. `docker compose -f docker-compose_dev.yaml --profile  maintenance up -d --build`) ──
  wartungsseite:
    profiles: ['maintenance']
    build:
      context: .
      dockerfile: maintenance/Dockerfile
    container_name: wartung_app
    ports:
      - '3000:80' # Wartungsbetrieb: Port 3000 von aussen geht intern auf Port 80
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
