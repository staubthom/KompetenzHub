services:
  postgres:
    image: postgres:16-alpine
    container_name: kompetenzhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kompetenzhub}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kompetenzhub-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: kompetenzhub-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

# ── Eigener Identity-Provider (Logto): Self-Service-Registrierung mit E-Mail/Passwort ──
  # Nutzt denselben Postgres-Server, aber eine eigene Datenbank `logto`.
  # OIDC-Endpoint (Login/Registrierung): http://localhost:3011
  # Admin-Konsole (App anlegen, Client-ID/Secret holen): http://localhost:3012
  logto:
    image: svhd/logto:latest
    container_name: kompetenzhub-logto
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    # Schema beim Start sicherstellen (idempotent), danach Server starten.
    entrypoint: ['sh', '-c', 'npm run cli db seed -- --swe && npm start']
    environment:
      # Logto MUSS intern auf denselben Ports lauschen, die der Browser sieht: Die CORS-Allowlist
      # der Admin-Konsole basiert auf dem internen Listen-Port. Veroeffentlicht man einen anderen
      # Port (z. B. 3012->3002), passt die Browser-Origin nicht zur erlaubten Origin und der Core
      # liefert kein Access-Control-Allow-Origin -> "Create application" haengt ohne Fehler.
      # Standardport 3001 (Core) kollidiert mit der KompetenzHub-API, daher 3011/3012.
      PORT: 3011
      ADMIN_PORT: 3012
      # für die Adminkonfiguration muss der auf true sein danach auf False, dann kommt man aber nicht mehr ins Admin Portal sein. 
      TRUST_PROXY_HEADER: true
      DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/logto
      ENDPOINT: ${KOMPETENZHUB_OIDC_ENDPOINT:-https://auth.kompetenzhub.ch}
      ADMIN_ENDPOINT: ${KOMPETENZHUB_ADMIN_ENDPOINT:-https://authadmin.kompetenzhub.ch}
      REDIS_URL: redis://redis:6379     
    ports:
      - '3011:3011' # OIDC-Endpoint  (Core)
      - '3012:3012' # Admin-Konsole
    healthcheck:
      # Erst "healthy", wenn die OIDC-Discovery antwortet -> dann ist die DB geseedet.
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3011/oidc/.well-known/openid-configuration',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Anwendung (nur mit Profil "app", z. B. `docker compose -f docker-compose_dev.yaml --profile  app up -d --build`) ──
  api:
    profiles: ['app']
    image: ghcr.io/staubthom/kompetenzhub/api:latest
    #build:
    #  context: .
    #  dockerfile: apps/api/Dockerfile
    container_name: kompetenzhub-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:      
      NODE_ENV: development
      API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kompetenzhub}?schema=public
      REDIS_URL: redis://redis:6379
      # S3_ENDPOINT: interne Adresse (Container→MinIO); S3_PUBLIC_URL: Browser-erreichbar
      S3_ENDPOINT: https://s3.kompetenzhub.ch
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://s3.kompetenzhub.ch}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      # In Produktion zwingend starke Werte in .env setzen (sonst bricht der Start ab).
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:?Bitte starken Wert in .env setzen}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-900}
      AI_CONFIG_ENC_KEY: ${AI_CONFIG_ENC_KEY:?Bitte starken Wert in .env setzen}
      DEV_LOGIN_ENABLED: ${DEV_LOGIN_ENABLED}
      SHOW_ADMIN_LOGIN: ${SHOW_ADMIN_LOGIN}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-demo}
      AUTH_EXCHANGE_SECRET: ${AUTH_EXCHANGE_SECRET}
      SUPERADMIN_EMAILS: ${SUPERADMIN_EMAILS}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      NEXT_PUBLIC_WEB_URL: ${WEB_PUBLIC_URL:-https://demo.kompetenzhub.ch}
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-300}
      THROTTLE_AUTH_LIMIT: ${THROTTLE_AUTH_LIMIT:-60}
      # ----- Auth (OIDC) – Frontend (NextAuth), optional bis IdP angebunden -----
      AUTH_MICROSOFT_CLIENT_ID: ${AUTH_MICROSOFT_CLIENT_ID}
      AUTH_MICROSOFT_CLIENT_SECRET: ${AUTH_MICROSOFT_CLIENT_SECRET}
      AUTH_GITHUB_CLIENT_ID: ${AUTH_GITHUB_CLIENT_ID}
      AUTH_GITHUB_CLIENT_SECRET: ${AUTH_GITHUB_CLIENT_SECRET}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID}
      AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET}          
      # OAuth App Client Secret aus GitHub
      # Lösen unter: https://console.cloud.google.com/apis/credentials      
      #in Github:unter Settings -> Developer settings -> OAuth Apps -> New OAuth App   
      KOMPETENZHUB_OIDC_ISSUER: ${KOMPETENZHUB_OIDC_ISSUER:-https://auth.kompetenzhub.ch/oidc}
      KOMPETENZHUB_OIDC_CLIENT_ID: ${KOMPETENZHUB_OIDC_CLIENT_ID}
      KOMPETENZHUB_OIDC_CLIENT_SECRET: ${KOMPETENZHUB_OIDC_CLIENT_SECRET}
      # Browser-erreichbare URLs des Logto-Containers (fuer abweichende Ports anpassen).
      KOMPETENZHUB_OIDC_ENDPOINT: ${KOMPETENZHUB_OIDC_ENDPOINT}
      KOMPETENZHUB_ADMIN_ENDPOINT: ${KOMPETENZHUB_ADMIN_ENDPOINT}     
      NEXTAUTH_SECRET:  ${NEXTAUTH_SECRET}     
      NEXTAUTH_URL:  ${NEXTAUTH_URL}   
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - '${API_PORT:-3001}:3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3001/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    profiles: ['app']
    image: ghcr.io/staubthom/kompetenzhub/web:latest
    #build:
    #  context: .
    #  dockerfile: apps/web/Dockerfile
    #  args:
        # NEXT_PUBLIC_API_URL wird zur Build-Zeit ins Bundle gebacken (Browser-seitig).
    #    NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:-https://api.kompetenzhub.ch}
    container_name: kompetenzhub-web
    restart: unless-stopped    
    environment:
      NODE_ENV: development     
      PORT: 3000
      # ----- Auth (OIDC) – Frontend (NextAuth), optional bis IdP angebunden -----
      AUTH_MICROSOFT_CLIENT_ID: ${AUTH_MICROSOFT_CLIENT_ID}
      AUTH_MICROSOFT_CLIENT_SECRET: ${AUTH_MICROSOFT_CLIENT_SECRET}
      AUTH_GITHUB_CLIENT_ID: ${AUTH_GITHUB_CLIENT_ID}
      AUTH_GITHUB_CLIENT_SECRET: ${AUTH_GITHUB_CLIENT_SECRET}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID}
      AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET}          
      # OAuth App Client Secret aus GitHub
      # Lösen unter: https://console.cloud.google.com/apis/credentials      
      #in Github:unter Settings -> Developer settings -> OAuth Apps -> New OAuth App   
      KOMPETENZHUB_OIDC_ISSUER: ${KOMPETENZHUB_OIDC_ISSUER:-https://auth.kompetenzhub.ch/oidc}
      KOMPETENZHUB_OIDC_CLIENT_ID: ${KOMPETENZHUB_OIDC_CLIENT_ID}
      KOMPETENZHUB_OIDC_CLIENT_SECRET: ${KOMPETENZHUB_OIDC_CLIENT_SECRET}
      # Browser-erreichbare URLs des Logto-Containers (fuer abweichende Ports anpassen).
      KOMPETENZHUB_OIDC_ENDPOINT: ${KOMPETENZHUB_OIDC_ENDPOINT}
      KOMPETENZHUB_ADMIN_ENDPOINT: ${KOMPETENZHUB_ADMIN_ENDPOINT}      
      AUTH_EXCHANGE_SECRET: ${AUTH_EXCHANGE_SECRET:-}
      NEXTAUTH_SECRET:  ${NEXTAUTH_SECRET}     
      NEXTAUTH_URL:  ${NEXTAUTH_URL}   
      NEXT_PUBLIC_TENANT_BASE_DOMAIN: ${NEXT_PUBLIC_TENANT_BASE_DOMAIN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - '${WEB_PORT:-3000}:3000'


   # ── Anwendung (nur mit Profil "maintenance", z. B. `docker compose -f docker-compose_dev.yaml --profile  maintenance up -d --build`) ──     
  wartungsseite:
    profiles: ['maintenance']
    build:
      context: .         
      dockerfile: maintenance/Dockerfile
    container_name: wartung_app
    ports:
      - "3000:80" # Wartungsbetrieb: Port 3000 von aussen geht intern auf Port 80
    restart: unless-stopped
# Ersetze den alten Volumes-Block am Ende deiner Datei hiermit:
volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/postgres
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis
  minio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/minio