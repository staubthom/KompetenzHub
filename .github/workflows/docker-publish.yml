name: Build and Push Monorepo Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dummy .env for build-time requirements
        run: |
          # Docker Compose prüft die Variablen beim Parsen der YAML.
          # Wir befüllen sie mit Dummy-Werten, damit der Build nicht abbricht.
          echo "POSTGRES_USER=build_user" >> .env
          echo "POSTGRES_PASSWORD=build_password" >> .env
          echo "MINIO_ROOT_USER=build_minio" >> .env
          echo "MINIO_ROOT_PASSWORD=build_minio_password" >> .env
          echo "JWT_SIGNING_KEY=temporary_build_key_that_is_long_enough_12345" >> .env
          echo "AI_CONFIG_ENC_KEY=temporary_build_key_that_is_long_enough_12345" >> .env
          echo "S3_BUCKET=kompetenzhub-bucket" >> .env

      - name: Build Images
        run: |
          docker compose -f docker-compose_dev.yaml --profile app build

      - name: Push Images
        run: |
          docker compose -f docker-compose_dev.yaml --profile app push